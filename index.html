<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>ARZ - Afet Sistemi</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  display:flex;
}

.sidebar {
  width:220px;
  background:#020617;
  padding:20px;
}

.sidebar h2 {
  color:#ef4444;
}

.menu {
  margin-top:20px;
}

.menu div {
  padding:10px;
  margin-bottom:8px;
  cursor:pointer;
  border-radius:8px;
}

.menu div:hover {
  background:#1e293b;
}

.main {
  flex:1;
  padding:20px;
}

.card {
  background:white;
  color:black;
  padding:20px;
  border-radius:12px;
  max-width:500px;
}

button {
  width:100%;
  padding:12px;
  background:#ef4444;
  border:none;
  color:white;
  margin-top:10px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>ARZ</h2>
  <div class="menu">
    <div onclick="sayfa('panel')">Panel</div>
    <div onclick="sayfa('harita')">Harita</div>
    <div onclick="sayfa('lojistik')">Lojistik</div>
    <div onclick="sayfa('ai')">ARZ AI</div>
  </div>
</div>

<div class="main" id="icerik"></div>

<script>

function sayfa(p) {

  if(p=="panel"){
    document.getElementById("icerik").innerHTML = `
      <h1>Kontrol Paneli</h1>
      <p>Sistem aktif</p>
    `;
  }

  if(p=="harita"){
    document.getElementById("icerik").innerHTML = `
      <h1>Harita</h1>
      <p>Buraya Google Maps / Leaflet gelecek</p>
    `;
  }

  if(p=="lojistik"){
    document.getElementById("icerik").innerHTML = `
      <h1>Yeni Sevkiyat</h1>
      <input id="lokasyon" placeholder="Konum">
      <input id="malzeme" placeholder="Malzeme">
      <button onclick="kaydet()">Kaydet</button>
    `;
  }

  if(p=="ai"){
    document.getElementById("icerik").innerHTML = `
      <div class="card">
        <h2>ARZ AI</h2>
        <input id="soru" placeholder="Sor">
        <button onclick="sor()">Sor</button>
        <p id="cevap"></p>
      </div>
    `;
  }
}

async function sor(){
  const mesaj = document.getElementById("soru").value;

  const res = await fetch("/api/ask", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:mesaj})
  });

  const data = await res.json();
  document.getElementById("cevap").innerText = data.answer;
}

function kaydet(){
  alert("Sevkiyat kaydedildi (demo)");
}

sayfa("panel");

</script>

</body>
</html>
