<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ARZ - Afet Raporlama ve Zamanlama</title>

<style>
:root{
  --primary:#0B2D5C;
  --primary-2:#003366;
  --accent:#E53935;
  --bg:#F4F6FA;
  --card:#FFFFFF;
  --text:#111827;
  --muted:#6B7280;
  --border:#E5E7EB;
  --success:#16A34A;
  --warning:#F59E0B;
  --danger:#DC2626;
  --info:#0284C7;
  --radius:18px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow:hidden;
}

.app{
  display:grid;
  grid-template-columns:270px minmax(0,1fr);
  height:100vh;
}

.sidebar{
  background:linear-gradient(180deg,#071A33,#0B2D5C);
  color:white;
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

.brand{
  padding:14px 10px 18px;
  border-bottom:1px solid rgba(255,255,255,.15);
}

.brand-title{
  font-size:42px;
  line-height:1;
  font-weight:950;
  letter-spacing:-2px;
}

.brand-title span{color:var(--accent)}

.brand-subtitle{
  margin-top:8px;
  font-size:10px;
  letter-spacing:2.2px;
  color:#CBD5E1;
  text-transform:uppercase;
  font-weight:800;
}

.brand-slogan{
  margin-top:8px;
  font-size:12px;
  color:#E5E7EB;
}

.nav{
  display:flex;
  flex-direction:column;
  gap:6px;
  overflow:auto;
}

.nav button{
  border:0;
  background:transparent;
  color:#CBD5E1;
  padding:11px 12px;
  border-radius:14px;
  text-align:left;
  font-weight:800;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:10px;
  transition:.15s;
}

.nav button:hover,
.nav button.active{
  background:linear-gradient(135deg,var(--primary-2),var(--accent));
  color:#fff;
  box-shadow:0 10px 24px rgba(0,0,0,.18);
}

.sidebar-footer{
  margin-top:auto;
  font-size:11px;
  color:#CBD5E1;
  line-height:1.45;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  border-radius:16px;
  padding:12px;
}

.main{
  height:100vh;
  display:flex;
  flex-direction:column;
  min-width:0;
}

.header{
  height:72px;
  background:rgba(255,255,255,.94);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  padding:0 22px;
}

.header h1{
  margin:0;
  font-size:22px;
  font-weight:900;
  color:var(--primary);
}

.header-actions{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:8px 11px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  background:#EEF2FF;
  color:var(--primary);
}

.badge.red{background:#FEE2E2;color:#B91C1C}
.badge.green{background:#DCFCE7;color:#166534}
.badge.orange{background:#FEF3C7;color:#92400E}

.content{
  flex:1;
  min-height:0;
  overflow:auto;
  padding:22px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:16px;
}

.grid-2{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:16px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:18px;
  box-shadow:0 12px 30px rgba(15,23,42,.07);
  min-width:0;
}

.card h2,.card h3{
  margin:0 0 10px;
  color:var(--primary);
}

.muted{color:var(--muted)}
.big{
  font-size:34px;
  font-weight:950;
  color:var(--primary);
}

.btn{
  border:0;
  border-radius:13px;
  padding:12px 14px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:white;
  font-weight:900;
  cursor:pointer;
  margin-top:8px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.btn.secondary{
  background:#E5E7EB;
  color:#111827;
}

.btn.full{width:100%}

input,select,textarea{
  width:100%;
  padding:12px;
  border:1px solid var(--border);
  border-radius:12px;
  margin:7px 0;
  font-size:14px;
  background:white;
  color:var(--text);
}

textarea{min-height:92px;resize:vertical}

.item{
  padding:12px;
  border:1px solid var(--border);
  border-radius:14px;
  background:#F8FAFC;
  margin-bottom:10px;
  line-height:1.45;
}

.layer-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:14px;
}

.layer{
  border:1px solid var(--border);
  background:#fff;
  color:var(--text);
  padding:10px 12px;
  border-radius:999px;
  font-weight:900;
  cursor:pointer;
}

.layer.active{
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#fff;
  border-color:var(--accent);
}

.map-box{
  height:440px;
  border-radius:20px;
  position:relative;
  overflow:hidden;
  border:1px solid var(--border);
  background:
    radial-gradient(circle at 28% 35%,rgba(220,38,38,.28),transparent 16%),
    radial-gradient(circle at 70% 30%,rgba(2,132,199,.22),transparent 18%),
    radial-gradient(circle at 48% 66%,rgba(22,163,74,.22),transparent 20%),
    linear-gradient(135deg,#DBEAFE,#ECFEFF 50%,#FEF9C3);
}

.map-box::after{
  content:"TÜRKİYE OPERASYON HARİTASI";
  position:absolute;
  left:18px;
  bottom:14px;
  font-size:12px;
  font-weight:900;
  letter-spacing:1px;
  color:rgba(11,45,92,.45);
}

.marker{
  position:absolute;
  transform:translate(-50%,-50%);
  color:#fff;
  padding:8px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 10px 24px rgba(0,0,0,.25);
  border:2px solid rgba(255,255,255,.8);
}

.ai-box{
  min-height:360px;
  background:#F8FAFC;
  border:1px solid var(--border);
  border-radius:16px;
  padding:14px;
  white-space:pre-wrap;
  line-height:1.55;
}

.chips{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin:10px 0 14px;
}

.chip{
  border:1px solid var(--border);
  background:white;
  padding:8px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
  cursor:pointer;
}

.settings{
  display:grid;
  grid-template-columns:260px minmax(0,1fr);
  gap:16px;
}

.settings-menu{
  max-height:calc(100vh - 130px);
  overflow:auto;
}

.settings-menu button{
  width:100%;
  text-align:left;
  border:0;
  background:transparent;
  color:var(--text);
  padding:11px 12px;
  border-radius:13px;
  font-weight:800;
  cursor:pointer;
  margin-bottom:6px;
}

.settings-menu button.active{
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:white;
}

.toggle-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  padding:12px 0;
  border-bottom:1px solid var(--border);
}

.switch{
  width:52px;
  height:30px;
  border-radius:999px;
  background:#CBD5E1;
  padding:3px;
  cursor:pointer;
  flex-shrink:0;
}

.switch.on{background:var(--accent)}

.knob{
  width:24px;
  height:24px;
  border-radius:50%;
  background:#fff;
  transition:.2s;
}

.switch.on .knob{transform:translateX(22px)}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.48);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:50;
}

.modal.show{display:flex}

.modal-box{
  background:#fff;
  border-radius:22px;
  padding:22px;
  width:min(620px,96vw);
  max-height:85vh;
  overflow:auto;
  box-shadow:0 30px 80px rgba(0,0,0,.35);
}

video{
  width:100%;
  background:#111827;
  border-radius:16px;
  min-height:220px;
}

@media(max-width:900px){
  body{overflow:auto}
  .app{grid-template-columns:1fr;height:auto;min-height:100vh}
  .sidebar{position:relative}
  .nav{display:grid;grid-template-columns:repeat(2,1fr)}
  .main{height:auto}
  .header{height:auto;align-items:flex-start;flex-direction:column;padding:14px}
  .content{padding:14px}
  .grid-2,.settings{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-title">ARZ<span>.</span></div>
      <div class="brand-subtitle">AFET RAPORLAMA VE ZAMANLAMA</div>
      <div class="brand-slogan">Doğru Veri, Doğru Zaman, Doğru Müdahale.</div>
    </div>

    <nav class="nav" id="nav"></nav>

    <div class="sidebar-footer">
      <b>ARZ Sistemi v5.1.1 Demo</b><br>
      Şehmus AYKUT tarafından geliştirilmiştir.<br>
      Local Brain ücretsiz mod aktiftir.
    </div>
  </aside>

  <main class="main">
    <header class="header">
      <h1 id="pageTitle">Panel</h1>
      <div class="header-actions">
        <span class="badge red">Acil Durum Protokolü</span>
        <span class="badge green">Local Brain</span>
        <span class="badge orange">Offline Demo</span>
      </div>
    </header>

    <section class="content" id="content"></section>
  </main>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div id="modalContent"></div>
    <button class="btn full" onclick="closeModal()">Kapat</button>
  </div>
</div>

<script>
const pages = [
  ["panel","📊","Panel"],
  ["map","🗺️","Harita"],
  ["logistics","🚛","Lojistik"],
  ["scanner","📷","Tarama Merkezi"],
  ["volunteers","👥","Gönüllü Sistemi"],
  ["field","📍","Saha Bildirimi"],
  ["publicHealth","🧬","Halk Sağlığı"],
  ["reports","📄","Raporlar"],
  ["ai","🤖","ARZ AI"],
  ["settings","⚙️","Ayarlar"]
];

let currentPage = "panel";
let currentLayer = localStorage.getItem("arz_layer") || "earthquake";
let selectedSetting = "general";
let cameraStream = null;

const state = {
  shipments: JSON.parse(localStorage.getItem("arz_shipments") || "[]"),
  volunteers: JSON.parse(localStorage.getItem("arz_volunteers") || "[]"),
  reports: JSON.parse(localStorage.getItem("arz_reports") || "[]"),
  fieldReports: JSON.parse(localStorage.getItem("arz_field_reports") || "[]"),
  aiHistory: JSON.parse(localStorage.getItem("arz_ai_history") || "[]"),
  settings: JSON.parse(localStorage.getItem("arz_settings") || "{}")
};

const defaultSettings = {
  notifications:true,
  localBrain:true,
  offlineMode:true,
  aiMemory:true,
  boldText:false,
  highContrast:false,
  largeButtons:false,
  mapLive:true,
  emergencySos:true,
  storeReports:true
};

state.settings = {...defaultSettings, ...state.settings};

function save(key,value){ localStorage.setItem(key, JSON.stringify(value)); }
function $(id){ return document.getElementById(id); }

function navRender(){
  $("nav").innerHTML = pages.map(([id,icon,label]) => `
    <button class="${currentPage===id?'active':''}" onclick="go('${id}')">
      <span>${icon}</span> ${label}
    </button>
  `).join("");
}

function go(page){
  currentPage = page;
  navRender();
  render();
}

function setTitle(text){ $("pageTitle").innerText = text; }

function openModal(html){
  $("modalContent").innerHTML = html;
  $("modal").classList.add("show");
}

function closeModal(){
  $("modal").classList.remove("show");
}

function render(){
  const c = $("content");

  if(currentPage === "panel"){
    setTitle("Genel Yönetim Paneli");
    c.innerHTML = `
      <div class="grid">
        <div class="card">
          <h3>Vaka / Yaralı Verisi</h3>
          <div class="big">1428</div>
          <p class="muted">Son 1 saatte +42 bildirim</p>
          <span class="badge red">Kritik izlem</span>
        </div>
        <div class="card">
          <h3>Lojistik Akış</h3>
          <div class="big">${state.shipments.length}</div>
          <p class="muted">Aktif kayıtlı sevkiyat</p>
          <button class="btn full" onclick="go('logistics')">Yeni Sevkiyat</button>
        </div>
        <div class="card">
          <h3>Gönüllü Yönetimi</h3>
          <div class="big">${state.volunteers.length}</div>
          <p class="muted">Kayıtlı gönüllü</p>
          <button class="btn full" onclick="go('volunteers')">Gönüllü Ekle</button>
        </div>
        <div class="card">
          <h3>Sistem Riski</h3>
          <div class="big">%84</div>
          <p class="muted">Afet yoğunluğu ve saha bildirimlerine göre</p>
          <button class="btn full" onclick="go('ai')">ARZ AI Analiz Al</button>
        </div>
      </div>

      <div class="grid-2" style="margin-top:16px">
        <div class="card">
          <h3>Hızlı İşlem Merkezi</h3>
          <button class="btn full" onclick="go('field')">Yeni Saha Bildirimi</button>
          <button class="btn full" onclick="go('map')">Haritada Göster</button>
          <button class="btn full" onclick="createReport()">Rapor Oluştur</button>
          <button class="btn full" onclick="go('scanner')">QR / Kimlik Tara</button>
        </div>

        <div class="card">
          <h3>Güncel Saha Bildirimleri</h3>
          ${state.fieldReports.length ? state.fieldReports.slice(-4).reverse().map(r => `
            <div class="item"><b>${r.type}</b><br>${r.city} • ${r.priority}<br>${r.note}</div>
          `).join("") : `
            <div class="item"><b>Acil Triaj Talebi</b><br>Hatay • Kritik • Demo bildirim</div>
            <div class="item"><b>Su Deposu Kritik</b><br>Elbistan • Yüksek • Demo bildirim</div>
            <div class="item"><b>Lojistik Sevkiyat</b><br>Ankara → Hatay • Yolda</div>
          `}
        </div>
      </div>
    `;
  }

  else if(currentPage === "map"){
    setTitle("Stratejik Afet Haritası");
    const markers = getMarkers(currentLayer);
    c.innerHTML = `
      <div class="layer-row">
        ${[
          ["earthquake","Deprem"],
          ["flood","Sel"],
          ["fire","Yangın"],
          ["logistics","Lojistik"],
          ["health","Sağlık"],
          ["volunteer","Gönüllü"]
        ].map(([id,label]) => `
          <button class="layer ${currentLayer===id?'active':''}" onclick="setLayer('${id}')">${label}</button>
        `).join("")}
      </div>

      <div class="grid-2">
        <div class="card">
          <h3>${layerName(currentLayer)} Katmanı</h3>
          <div class="map-box">
            ${markers.map(m => `
              <div class="marker" style="left:${m.x}%;top:${m.y}%;background:${m.color}" onclick="showMapInfo('${m.city}','${m.type}','${m.risk}','${m.note}')">
                ${m.city}
              </div>
            `).join("")}
          </div>
        </div>

        <div class="card" id="mapInfo">
          <h3>Harita Bilgisi</h3>
          <p>Aktif katman: <b>${layerName(currentLayer)}</b></p>
          <p><b>Yozgat:</b> Pilot koordinasyon merkezi olarak izlenir.</p>
          <p class="muted">Marker seçerek il bazlı risk detayını görüntüleyebilirsin.</p>
          <button class="btn full" onclick="go('ai')">ARZ AI ile Analiz Et</button>
        </div>
      </div>
    `;
  }

  else if(currentPage === "logistics"){
    setTitle("Lojistik ve Sevkiyat");
    c.innerHTML = `
      <div class="grid-2">
        <div class="card">
          <h3>Yeni Sevkiyat</h3>
          <input id="shipName" placeholder="Sevkiyat adı">
          <input id="from" placeholder="Çıkış noktası">
          <input id="to" placeholder="Varış noktası">
          <input id="vehicle" placeholder="Araç tipi / plaka">
          <input id="driver" placeholder="Şoför / firma">
          <textarea id="contentShip" placeholder="İçerik / miktar"></textarea>
          <select id="priority">
            <option>Kritik</option>
            <option>Yüksek</option>
            <option>Orta</option>
            <option>Düşük</option>
          </select>
          <button class="btn full" onclick="addShipment()">Sevkiyat Ekle</button>
        </div>

        <div class="card">
          <h3>Aktif Sevkiyatlar</h3>
          ${state.shipments.length ? state.shipments.slice().reverse().map(s => `
            <div class="item">
              <b>${s.name}</b><br>
              ${s.from} → ${s.to}<br>
              ${s.content}<br>
              Araç: ${s.vehicle || "-"}<br>
              Şoför/Firma: ${s.driver || "-"}<br>
              Öncelik: <b>${s.priority}</b><br>
              Durum: ${s.status}
              <button class="btn secondary full" onclick="applyRoute('${s.id}')">Rotayı Uygula</button>
            </div>
          `).join("") : "<p class='muted'>Henüz sevkiyat yok.</p>"}
        </div>
      </div>
    `;
  }

  else if(currentPage === "scanner"){
    setTitle("ARZ Tarama Merkezi");
    c.innerHTML = `
      <div class="grid-2">
        <div class="card">
          <h3>QR / Barkod / Kimlik / NFC</h3>
          <p class="muted">Kamera destekliyse izin isteyerek açılır. Demo tarama her cihazda çalışır.</p>
          <video id="camera" autoplay playsinline></video>
          <button class="btn full" onclick="openCamera()">Kamerayı Aç</button>
          <button class="btn secondary full" onclick="closeCamera()">Kamerayı Kapat</button>
          <button class="btn full" onclick="demoQR()">Demo QR Tara</button>
          <button class="btn full" onclick="demoNFC()">Demo NFC / Sağlık Kartı Oku</button>
        </div>

        <div class="card" id="scanResult">
          <h3>Tarama Sonucu</h3>
          <p>Henüz tarama yapılmadı.</p>
        </div>
      </div>
    `;
  }

  else if(currentPage === "volunteers"){
    setTitle("Gönüllü Sistemi");
    c.innerHTML = `
      <div class="grid-2">
        <div class="card">
          <h3>Gönüllü Ekle</h3>
          <input id="volName" placeholder="Ad Soyad">
          <input id="volCity" placeholder="İl">
          <input id="volSkill" placeholder="Yetkinlik">
          <select id="volAvailable">
            <option>Uygun</option>
            <option>Görevde</option>
            <option>Beklemede</option>
          </select>
          <button class="btn full" onclick="addVolunteer()">Gönüllü Kaydet</button>
        </div>

        <div class="card">
          <h3>Kayıtlı Gönüllüler</h3>
          ${state.volunteers.length ? state.volunteers.slice().reverse().map(v => `
            <div class="item">
              <b>${v.name}</b><br>
              ${v.city}<br>
              Yetkinlik: ${v.skill}<br>
              Durum: ${v.available}
              <button class="btn secondary full" onclick="assignVolunteer('${v.id}')">Görev Ata</button>
            </div>
          `).join("") : "<p class='muted'>Henüz gönüllü yok.</p>"}
        </div>
      </div>
    `;
  }

  else if(currentPage === "field"){
    setTitle("Saha Bildirimi");
    c.innerHTML = `
      <div class="grid-2">
        <div class="card">
          <h3>Yeni Saha Bildirimi</h3>
          <select id="fieldType">
            <option>Yaralı / Triaj</option>
            <option>Su İhtiyacı</option>
            <option>Gıda İhtiyacı</option>
            <option>Yol Kapalı</option>
            <option>Barınma İhtiyacı</option>
          </select>
          <input id="fieldCity" placeholder="İl / İlçe">
          <select id="fieldPriority">
            <option>Kritik</option>
            <option>Yüksek</option>
            <option>Orta</option>
            <option>Düşük</option>
          </select>
          <textarea id="fieldNote" placeholder="Açıklama"></textarea>
          <button class="btn full" onclick="addFieldReport()">Bildirimi Kaydet</button>
        </div>

        <div class="card">
          <h3>Son Bildirimler</h3>
          ${state.fieldReports.length ? state.fieldReports.slice().reverse().map(r => `
            <div class="item"><b>${r.type}</b><br>${r.city} • ${r.priority}<br>${r.note}</div>
          `).join("") : "<p class='muted'>Henüz bildirim yok.</p>"}
        </div>
      </div>
    `;
  }

  else if(currentPage === "publicHealth"){
    setTitle("Halk Sağlığı");
    c.innerHTML = `
      <div class="grid">
        <div class="card"><h3>Enfeksiyon Riski</h3><div class="big">%12</div><p class="muted">Düşük-orta izlem</p></div>
        <div class="card"><h3>Su Güvenliği</h3><div class="big">%98</div><p class="muted">Klorlama yeterli</p></div>
        <div class="card"><h3>Aşılama Oranı</h3><div class="big">%84</div><p class="muted">Mobil ekip takibi</p></div>
        <div class="card"><h3>Sağlık Hizmetlerinde Normalleşme</h3><div class="big">%71</div><p class="muted">Halk sağlığı izlem göstergesi</p></div>
      </div>

function addShipment(){
  const s = {

    to:$("to").value || "Hatay",

    priority:$("priority").value,

  };

function applyRoute(id){
  const s = state.shipments.find(x => x.id === id);
  if(s){
    s.status = "Rota Uygulandı";
    s.routeScore = Math.floor(70 + Math.random()*25);
    save("arz_shipments", state.shipments);
    openModal(`<h2>Rota Uygulandı</h2><p>${s.from} → ${s.to}</p><p>Rota güvenlik skoru: <b>${s.routeScore}</b></p>`);
    render();
  }
}

}

async function askAI(){
  const input = $("soru");
  const cevap = $("cevap");
  const mesaj = input.value.trim();
  if(!mesaj){
    cevap.innerText = "Lütfen bir soru yazın.";
    return;
  }

  cevap.innerText = "ARZ AI düşünüyor...";

  try{
    const res = await fetch("/api/ask", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:mesaj})
    });
    const data = await res.json();
    cevap.innerText = data.answer || "Cevap alınamadı.";

    if(state.settings.aiMemory){
      state.aiHistory.push({q:mesaj,a:data.answer,date:new Date().toISOString()});
      save("arz_ai_history", state.aiHistory);
    }
  }catch(e){
    cevap.innerText = "ARZ AI bağlantı hatası.";
  }
}

function quickAsk(q){
  $("soru").value = q;
  askAI();
}

async function openCamera(){
  try{
    cameraStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}, audio:false});
    $("camera").srcObject = cameraStream;
  }catch(e){
    openModal("<h2>Kamera Açılamadı</h2><p>Kamera için HTTPS ve tarayıcı izni gerekir. Bu cihaz veya tarayıcı izin vermemiş olabilir.</p>");
  }
}

function closeCamera(){
  if(cameraStream){
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
}

function renderSettings(){

    ["security","Güvenlik ve Veri"],

  $("content").innerHTML = `
    <div class="settings">
      <div class="card settings-menu">
        ${sections.map(([id,label]) => `
          <button class="${selectedSetting===id?'active':''}" onclick="selectSetting('${id}')">${label}</button>
        `).join("")}
      </div>
      <div class="card" id="settingsContent"></div>
    </div>
  `;
  renderSettingContent();
}

function selectSetting(id){

function toggleSetting(key){
  state.settings[key] = !state.settings[key];
  save("arz_settings", state.settings);
  applySettings();
  renderSettings();
}

function settingRow(key,label,desc){
  return `
    <div class="toggle-row">
      <div>
        <b>${label}</b><br>
        <span class="muted">${desc}</span>
      </div>
      <div class="switch ${state.settings[key]?'on':''}" onclick="toggleSetting('${key}')">
        <div class="knob"></div>
      </div>
    </div>
  `;
}

  if(selectedSetting === "general"){

      ${settingRow("offlineMode","Offline Harita Demo","Veriler cihazda saklanır.")}

function applySettings(){
  document.body.style.fontWeight = state.settings.boldText ? "700" : "400";
  document.body.style.filter = state.settings.highContrast ? "contrast(1.12)" : "none";
  document.querySelectorAll(".btn").forEach(b => {
    b.style.padding = state.settings.largeButtons ? "15px 17px" : "";
  });
}

navRender();
applySettings();
render();
</script>
