<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ARZ - Afet Raporlama ve Zamanlama</title>
<style>
:root{--primary:#0b2d5c;--accent:#e53935;--bg:#f4f6f9;--card:#fff;--text:#111827;--muted:#6b7280;--border:#e5e7eb}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,system-ui;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.app{display:grid;grid-template-columns:250px 1fr;height:100vh}
.sidebar{background:#071a33;color:white;padding:20px 16px;display:flex;flex-direction:column}
.brand-title{font-size:34px;font-weight:900}.brand-title span{color:var(--accent)}
.brand-sub{font-size:10px;letter-spacing:2px;color:#cbd5e1;margin-bottom:28px}
.nav button{width:100%;border:0;background:transparent;color:#cbd5e1;text-align:left;padding:12px 14px;margin-bottom:8px;border-radius:12px;cursor:pointer;font-weight:700}
.nav button.active,.nav button:hover{background:linear-gradient(135deg,var(--primary),var(--accent));color:white}
.sidebar-footer{margin-top:auto;font-size:11px;color:#94a3b8;line-height:1.5}
.main{height:100vh;display:flex;flex-direction:column;min-width:0}
.header{height:70px;background:white;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 22px}
.header h1{margin:0;font-size:22px}.status{display:flex;gap:10px}.badge{padding:8px 12px;border-radius:999px;background:#eef2ff;color:var(--primary);font-size:12px;font-weight:800}.red{background:#fee2e2;color:#b91c1c}
.content{padding:22px;overflow:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px}
.card{background:white;border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:0 10px 25px rgba(15,23,42,.06)}
.big{font-size:32px;font-weight:900;color:var(--primary)}
.btn{border:0;background:linear-gradient(135deg,var(--primary),var(--accent));color:white;padding:12px 14px;border-radius:12px;font-weight:800;cursor:pointer;margin-top:10px}
.btn.secondary{background:#e5e7eb;color:#111827}
input,select,textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;margin:7px 0;font-size:14px}
textarea{min-height:90px}
.item{padding:12px;border:1px solid var(--border);border-radius:14px;background:#f8fafc;margin-bottom:10px}
.map-box{height:420px;border-radius:20px;background:linear-gradient(135deg,#dbeafe,#ecfeff);border:1px solid var(--border);position:relative;overflow:hidden}
.marker{position:absolute;transform:translate(-50%,-50%);padding:8px 10px;border-radius:999px;color:white;font-size:12px;font-weight:900;cursor:pointer}
.layer{border:1px solid var(--border);background:white;padding:10px 12px;border-radius:999px;font-weight:800;cursor:pointer;margin:4px}
.layer.active{background:linear-gradient(135deg,var(--primary),var(--accent));color:white}
.answer{white-space:pre-wrap;line-height:1.55;background:#f8fafc;border-radius:14px;padding:14px;border:1px solid var(--border);margin-top:12px}
@media(max-width:850px){.app{grid-template-columns:1fr}.sidebar{height:auto}.nav{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}body{overflow:auto}.main{height:auto}}
</style>
</head>

<body>
<div class="app">
<aside class="sidebar">
  <div class="brand">
    <div class="brand-title">ARZ<span>.</span></div>
    <div class="brand-sub">AFET RAPORLAMA VE ZAMANLAMA</div>
  </div>
  <nav class="nav" id="nav"></nav>
  <div class="sidebar-footer">ARZ Sistemi © 2026<br>Şehmus AYKUT tarafından geliştirilmiştir.</div>
</aside>

<main class="main">
  <header class="header">
    <h1 id="pageTitle">Panel</h1>
    <div class="status">
      <span class="badge red">Acil Durum Protokolü</span>
      <span class="badge">Local Brain Aktif</span>
      <span class="badge">Offline Sync</span>
    </div>
  </header>
  <section class="content" id="content"></section>
</main>
</div>

<script>
const pages=[
["panel","Panel"],["map","Harita"],["logistics","Lojistik"],["scanner","Tarama Merkezi"],
["volunteers","Gönüllü Sistemi"],["publicHealth","Halk Sağlığı"],["reports","Raporlar"],["ai","ARZ AI"],["settings","Ayarlar"]
];

let currentPage="panel";
let currentLayer="earthquake";

const state={
shipments:JSON.parse(localStorage.getItem("arz_shipments")||"[]"),
volunteers:JSON.parse(localStorage.getItem("arz_volunteers")||"[]"),
reports:JSON.parse(localStorage.getItem("arz_reports")||"[]")
};

function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
function navRender(){
 document.getElementById("nav").innerHTML=pages.map(([id,label])=>`<button class="${currentPage===id?'active':''}" onclick="go('${id}')">${label}</button>`).join("");
}
function go(p){currentPage=p;navRender();render()}
function title(t){document.getElementById("pageTitle").innerText=t}

function render(){
const c=document.getElementById("content");

if(currentPage==="panel"){
title("Genel Yönetim Paneli");
c.innerHTML=`
<div class="grid">
<div class="card"><h3>Vaka / Yaralı Verisi</h3><div class="big">1428</div><p>Son 1 saatte +42 bildirim</p></div>
<div class="card"><h3>Lojistik Akış</h3><div class="big">${state.shipments.length}</div><p>Aktif sevkiyat</p></div>
<div class="card"><h3>Gönüllü Yönetimi</h3><div class="big">${state.volunteers.length}</div><p>Kayıtlı gönüllü</p></div>
<div class="card"><h3>Sistem Riski</h3><div class="big">%84</div><p>Kritik durum izleniyor</p></div>
</div>
<div class="card" style="margin-top:16px">
<h3>Hızlı İşlem Merkezi</h3>
<button class="btn" onclick="go('logistics')">Yeni Sevkiyat</button>
<button class="btn" onclick="go('map')">Haritada Göster</button>
<button class="btn" onclick="go('ai')">ARZ AI Analiz Al</button>
<button class="btn" onclick="createReport()">Rapor Oluştur</button>
</div>`;
}

else if(currentPage==="map"){
title("Stratejik Afet Haritası");
const markers=getMarkers(currentLayer);
c.innerHTML=`
<div>
${[["earthquake","Deprem"],["flood","Sel"],["fire","Yangın"],["logistics","Lojistik"],["health","Sağlık"]].map(x=>`<button class="layer ${currentLayer===x[0]?'active':''}" onclick="setLayer('${x[0]}')">${x[1]}</button>`).join("")}
</div>
<div class="grid" style="margin-top:14px">
<div class="card"><h3>${layerName(currentLayer)} Katmanı</h3><div class="map-box">
${markers.map(m=>`<div class="marker" style="left:${m.x}%;top:${m.y}%;background:${m.color}" onclick="showMapInfo('${m.city}','${m.type}','${m.risk}')">${m.city}</div>`).join("")}
</div></div>
<div class="card" id="mapInfo"><h3>Harita Bilgisi</h3><p>Katman seçin veya marker’a tıklayın.</p><p><b>Yozgat:</b> Pilot koordinasyon merkezi.</p></div>
</div>`;
}

else if(currentPage==="logistics"){
title("Lojistik ve Sevkiyat");
c.innerHTML=`
<div class="grid">
<div class="card">
<h3>Yeni Sevkiyat</h3>
<input id="shipName" placeholder="Sevkiyat adı">
<input id="from" placeholder="Çıkış noktası">
<input id="to" placeholder="Varış noktası">
<input id="vehicle" placeholder="Araç tipi / plaka">
<textarea id="contentShip" placeholder="İçerik / miktar"></textarea>
<select id="priority"><option>Kritik</option><option>Yüksek</option><option>Orta</option><option>Düşük</option></select>
<button class="btn" onclick="addShipment()">Sevkiyat Ekle</button>
</div>
<div class="card"><h3>Aktif Sevkiyatlar</h3>
${state.shipments.length?state.shipments.map(s=>`<div class="item"><b>${s.name}</b><br>${s.from} → ${s.to}<br>${s.content}<br>Öncelik: ${s.priority}<br>Durum: ${s.status}<br><button class="btn secondary" onclick="applyRoute('${s.id}')">Rotayı Uygula</button></div>`).join(""):"<p>Henüz sevkiyat yok.</p>"}
</div></div>`;
}

else if(currentPage==="scanner"){
title("ARZ Tarama Merkezi");
c.innerHTML=`
<div class="grid">
<div class="card"><h3>QR / Barkod Tarama</h3><video id="camera" autoplay playsinline style="width:100%;border-radius:14px;background:#111"></video>
<button class="btn" onclick="openCamera()">Kamerayı Aç</button>
<button class="btn secondary" onclick="closeCamera()">Kamerayı Kapat</button>
<button class="btn" onclick="demoQR()">Demo QR Tara</button></div>
<div class="card" id="scanResult"><h3>Tarama Sonucu</h3><p>Henüz tarama yapılmadı.</p></div>
</div>`;
}

else if(currentPage==="volunteers"){
title("Gönüllü Sistemi");
c.innerHTML=`
<div class="grid">
<div class="card"><h3>Gönüllü Ekle</h3><input id="volName" placeholder="Ad Soyad"><input id="volCity" placeholder="İl"><input id="volSkill" placeholder="Yetkinlik"><button class="btn" onclick="addVolunteer()">Gönüllü Kaydet</button></div>
<div class="card"><h3>Kayıtlı Gönüllüler</h3>${state.volunteers.length?state.volunteers.map(v=>`<div class="item"><b>${v.name}</b><br>${v.city}<br>${v.skill}<br>Durum: Aktif</div>`).join(""):"<p>Henüz gönüllü yok.</p>"}</div>
</div>`;
}

else if(currentPage==="publicHealth"){
title("Halk Sağlığı");
c.innerHTML=`
<div class="grid">
<div class="card"><h3>Enfeksiyon Riski</h3><div class="big">%12</div></div>
<div class="card"><h3>Su Güvenliği</h3><div class="big">%98</div></div>
<div class="card"><h3>Aşılama Oranı</h3><div class="big">%84</div></div>
<div class="card"><h3>Sağlık Hizmetlerinde Normalleşme</h3><div class="big">%71</div><p>Halk sağlığı izlem göstergesi.</p></div>
</div>`;
}

else if(currentPage==="reports"){
title("Veri Raporları");
c.innerHTML=`<div class="card"><h3>Raporlar</h3><button class="btn" onclick="createReport()">Yeni Rapor Oluştur</button><div style="margin-top:14px">${state.reports.length?state.reports.map(r=>`<div class="item"><b>${r.title}</b><br>${r.date}<br>${r.summary}</div>`).join(""):"<p>Henüz rapor yok.</p>"}</div></div>`;
}

else if(currentPage==="ai"){
title("ARZ AI Akıllı Asistan");
c.innerHTML=`
<div class="card">
<h3>ARZ AI</h3>
<input id="soru" placeholder="Sorunuzu yazın...">
<button class="btn" onclick="askAI()">Sor</button>
<div class="answer" id="cevap">Cevap burada görünecek.</div>
</div>`;
}

else if(currentPage==="settings"){
title("Sistem Ayarları");
c.innerHTML=`
<div class="grid">
<div class="card"><h3>Genel</h3><p>Offline mod, Local Brain ve demo sistem aktiftir.</p></div>
<div class="card"><h3>Görünüm</h3><button class="btn" onclick="setTheme('afad')">AFAD</button><button class="btn" onclick="setTheme('kizilay')">Kızılay</button><button class="btn" onclick="setTheme('yesilay')">Yeşilay</button></div>
<div class="card"><h3>Hakkında</h3><p><b>ARZ</b> afet raporlama, zamanlama, lojistik ve karar destek sistemidir.</p><p>Geliştirici: Şehmus AYKUT</p></div>
</div>`;
}
}

function getMarkers(layer){
const data={
earthquake:[["İstanbul",30,35,"Deprem","Kritik","#dc2626"],["Hatay",55,70,"Deprem","Kritik","#dc2626"],["Kahramanmaraş",60,62,"Deprem","Yüksek","#f97316"]],
flood:[["Rize",76,28,"Sel","Yüksek","#0284c7"],["Antalya",42,78,"Sel","Orta","#0ea5e9"],["Trabzon",72,30,"Sel","Yüksek","#0284c7"]],
fire:[["Muğla",32,78,"Yangın","Kritik","#ea580c"],["Antalya",43,78,"Yangın","Yüksek","#f97316"],["İzmir",25,62,"Yangın","Orta","#fb923c"]],
logistics:[["Ankara",45,50,"Lojistik","Merkez","#16a34a"],["Yozgat",52,48,"Pilot Merkez","Aktif","#16a34a"],["Hatay",55,70,"Sevkiyat","Kritik","#16a34a"]],
health:[["İstanbul",30,35,"Sağlık","Yoğun","#7c3aed"],["Ankara",45,50,"Sağlık","Aktif","#7c3aed"],["Hatay",55,70,"Sağlık","Kritik","#7c3aed"]]
};
return (data[layer]||data.earthquake).map(a=>({city:a[0],x:a[1],y:a[2],type:a[3],risk:a[4],color:a[5]}));
}
function layerName(l){return {earthquake:"Deprem",flood:"Sel",fire:"Yangın",logistics:"Lojistik",health:"Sağlık"}[l]||"Harita"}
function setLayer(l){currentLayer=l;render()}
function showMapInfo(city,type,risk){document.getElementById("mapInfo").innerHTML=`<h3>${city}</h3><p>Tür: ${type}</p><p>Risk: <b>${risk}</b></p><p>ARZ AI önerisi: Bölge için saha bildirimi, lojistik ve sağlık koordinasyonu birlikte değerlendirilmelidir.</p>`}

function addShipment(){
const s={id:"S"+Date.now(),name:shipName.value||"Sevkiyat",from:from.value||"Ankara",to:to.value||"Hatay",vehicle:vehicle.value,content:contentShip.value||"Tıbbi malzeme",priority:priority.value,status:"Yolda"};
state.shipments.push(s);save("arz_shipments",state.shipments);render();
}
function applyRoute(id){const s=state.shipments.find(x=>x.id===id); if(s){s.status="Rota Uygulandı";save("arz_shipments",state.shipments);render();}}
function addVolunteer(){const v={name:volName.value||"Gönüllü",city:volCity.value||"Yozgat",skill:volSkill.value||"Saha destek"};state.volunteers.push(v);save("arz_volunteers",state.volunteers);render();}
function createReport(){const r={title:"ARZ Raporu #"+(state.reports.length+1),date:new Date().toLocaleString("tr-TR"),summary:"Demo afet durum raporu oluşturuldu."};state.reports.push(r);save("arz_reports",state.reports);go("reports");}

async function askAI(){
const mesaj=document.getElementById("soru").value;
const cevap=document.getElementById("cevap");
cevap.innerText="ARZ AI düşünüyor...";
try{
const res=await fetch("/api/ask",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:mesaj})});
const data=await res.json();
cevap.innerText=data.answer||"Cevap alınamadı.";
}catch(e){cevap.innerText="ARZ AI bağlantı hatası."}
}

let stream=null;
async function openCamera(){
try{
stream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
document.getElementById("camera").srcObject=stream;
}catch(e){alert("Kamera izni alınamadı veya cihaz desteklemiyor.")}
}
function closeCamera(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}}
function demoQR(){
document.getElementById("scanResult").innerHTML=`<h3>Doğrulandı</h3><p><b>AFAD-AID-2026-TR-0982</b></p><p>Tıbbi Malzeme Konteyneri</p><p>Bölge: Hatay / Kırıkhan</p><button class="btn" onclick="go('logistics')">Lojistiğe Aktar</button>`;
}
function setTheme(t){
if(t==="kizilay"){document.documentElement.style.setProperty("--primary","#7f1d1d");document.documentElement.style.setProperty("--accent","#dc2626")}
if(t==="yesilay"){document.documentElement.style.setProperty("--primary","#065f46");document.documentElement.style.setProperty("--accent","#22c55e")}
if(t==="afad"){document.documentElement.style.setProperty("--primary","#0b2d5c");document.documentElement.style.setProperty("--accent","#e53935")}
}

navRender();
render();
</script>
</body>
</html>
